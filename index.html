<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget Tracker</title>
<style>
:root{--bg:#0f1117;--bg2:#1e2230;--bg3:#161a26;--border:#2d3348;--border2:#3d4562;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--red:#f87171;--green:#34d399;--yellow:#fbbf24;--purple:#818cf8;--indigo:#6366f1;--r:12px;--rsm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none;border-radius:0}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 0}
#nav{display:flex;background:var(--bg3);border-top:1px solid var(--border);padding:8px 0 24px;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);font-size:10px;padding:4px 0;cursor:pointer}
.nb.active{color:var(--indigo)}
.nb svg{width:22px;height:22px;pointer-events:none}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.ct{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pt{font-size:18px;font-weight:700}
.ps{font-size:12px;color:var(--text3);margin-top:1px}
#ph{display:none}.krow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.kl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kv{font-size:22px;font-weight:700;line-height:1.1}
.ks{font-size:10px;color:var(--text3);margin-top:2px}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mb{background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:44px;height:44px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ml{font-size:16px;font-weight:600}
.cbi{margin-bottom:10px}
.cbt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cbn{font-size:13px}
.cbv{font-size:11px;color:var(--text3)}
.cbv .cur{color:var(--text);font-weight:600}
.bt{height:6px;background:var(--border);border-radius:3px;position:relative;overflow:hidden}
.bfp{height:100%;border-radius:3px;background:var(--border2);position:absolute;top:0;left:0;opacity:.5}
.bfc{height:100%;border-radius:3px;position:absolute;top:0;left:0}
.ad{width:6px;height:6px;border-radius:50%;background:var(--yellow);display:inline-block;margin-left:4px;vertical-align:middle}
.ab{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--yellow)}
.ab strong{display:block;margin-bottom:4px;font-size:10px}
#pa{display:none}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.fi input,.fi select,.fi textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:16px;padding:12px 14px;outline:none}
.fi input:focus,.fi textarea:focus{border-color:var(--indigo)}
.fi textarea{resize:none;height:70px;font-size:14px}
.aw{position:relative}
.aw input{padding-left:30px;font-size:22px;font-weight:700}
.aw .eu{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cc{padding:10px 4px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;text-align:center;cursor:pointer;line-height:1.3}
.cc.active{border-color:var(--indigo);background:rgba(99,102,241,.15);color:var(--purple)}
.sb{width:100%;padding:16px;border-radius:var(--r);border:none;font-size:17px;font-weight:700;cursor:pointer;margin-top:6px;background:var(--red);color:#fff}
#phs{display:none}
.fb{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fb::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap}
.fc.active{background:var(--indigo);border-color:var(--indigo);color:#fff}
.tdh{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:10px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.ti{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.tid{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tii{flex:1;min-width:0}
.tic{font-size:14px;font-weight:600}
.tin{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tia{font-size:15px;font-weight:700;flex-shrink:0;color:var(--red)}
.lm{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text3);border-radius:var(--rsm);cursor:pointer;font-size:13px;margin-top:8px}
#pr{display:none}
.ptabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:8px;border-radius:var(--rsm);border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;text-align:center}
.ptab.active{background:var(--indigo);border-color:var(--indigo);color:#fff}
.ybi{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ybl{font-size:11px;color:var(--text3);text-align:right;flex-shrink:0}
.ybt{flex:1;height:22px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.ybf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--indigo),var(--purple))}
.ybv{font-size:11px;color:var(--text);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-weight:600}
#pst{display:none}
.sr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sl{font-size:14px}
.ss{font-size:11px;color:var(--text3);margin-top:2px}
.si{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:7px 10px;width:75px;text-align:right;outline:none}
.db{width:100%;padding:13px;border-radius:var(--rsm);border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.08);color:var(--red);font-size:14px;cursor:pointer;margin-top:8px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e2230;border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:100}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end}
#modal.open{display:flex}
.mbox{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%}
.mt{font-size:17px;font-weight:700;margin-bottom:12px}
.mb2{font-size:14px;color:var(--text3);margin-bottom:16px}
.mbtn{width:100%;padding:14px;border-radius:var(--rsm);border:none;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:8px}
.mbtn.danger{background:rgba(248,113,113,.15);color:var(--red)}
.mbtn.cancel{background:var(--bg3);color:var(--text3)}
</style>
</head>

  const mx=Math.max(...sorted.map(([c,v])=>Math.max(v,catP[c]||0)),1);
  let html='';
  if(!sorted.length)html='<div style="color:var(--text3);font-size:13px;padding:8px 0">Nessuna spesa questo mese.</div>';
  sorted.forEach(([cat,val])=>{
    const pv=catP[cat]||0,pc=(val/mx)*100,pp=(pv/mx)*100;
    const thr=CFG.thresholds[cat],alrt=thr&&pv>0&&((val-pv)/pv*100)>thr;
    html+=`<div class="cbi"><div class="cbt"><div class="cbn" style="color:${cc(cat)}">${cat}${alrt?'<span class="ad"></span>':''}</div><div class="cbv"><span class="cur">€${Math.round(val).toLocaleString('it-IT')}</span>${pv>0?' / €'+Math.round(pv).toLocaleString('it-IT'):''}</div></div><div class="bt"><div class="bfp" style="width:${pp}%"></div><div class="bfc" style="width:${pc}%;background:${cc(cat)}"></div></div></div>`;
  });
  q('hc').innerHTML=html;
}
function chkAlerts(tc,tp){
  const cc2={},cp2={};
  tc.forEach(t=>{cc2[t.category]=(cc2[t.category]||0)+t.amount});
  tp.forEach(t=>{cp2[t.category]=(cp2[t.category]||0)+t.amount});
  return Object.entries(CFG.thresholds).filter(([cat,thr])=>thr&&cc2[cat]&&cp2[cat]&&((cc2[cat]-cp2[cat])/cp2[cat]*100)>thr).map(([cat,thr])=>`${cat}: +${Math.round(((cc2[cat]-cp2[cat])/cp2[cat])*100)}% (soglia ${thr}%)`);
}
function rAdd(){
  q('adate').value=new Date().toISOString().split('T')[0];
  q('aa').value='';q('an').value='';sc='';
  q('cgrid').innerHTML=getCats().map(c=>`<div class="cc" data-cat="${c}">${c}</div>`).join('');
  q('cgrid').querySelectorAll('.cc').forEach(el=>el.addEventListener('click',function(){sc=this.dataset.cat;q('cgrid').querySelectorAll('.cc').forEach(e=>e.classList.remove('active'));this.classList.add('active')}));
}
function submitE(){
  const amt=parseFloat(q('aa').value),date=q('adate').value,note=q('an').value.trim();
  if(!amt||amt<=0){toast('⚠️ Importo non valido');return}
  if(!date){toast('⚠️ Inserisci una data');return}
  if(!sc){toast('⚠️ Seleziona una categoria');return}
  ST.transactions.unshift({id:ST.nextId++,date,type:'expense',category:sc,amount:Math.round(amt*100)/100,note,imported:false});
  saveST();toast('✅ Salvato!');
  q('aa').value='';q('an').value='';sc='';
  q('cgrid').querySelectorAll('.cc').forEach(e=>e.classList.remove('active'));
  q('adate').value=new Date().toISOString().split('T')[0];
}
function rHist(){
  const cats=['Tutte',...getCats()];
  q('hf').innerHTML=cats.map(c=>`<button class="fc${hf===c?' active':''}" data-c="${c}">${c}</button>`).join('');
  q('hf').querySelectorAll('.fc').forEach(el=>el.addEventListener('click',function(){hf=this.dataset.c;hp=0;rHist()}));
  let txs=getTx().filter(t=>hf==='Tutte'||t.category===hf);
  txs=txs.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  q('hsc').textContent=txs.length+' transazioni';
  bldTx(txs);
}
function bldTx(txs){
  const sl=txs.slice(hp*HPS,(hp+1)*HPS);
  let html='',ld='';
  sl.forEach(t=>{
    const d=new Date(t.date),ds=d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
    if(ds!==ld){html+=`<div class="tdh">${ds}</div>`;ld=ds;}
    const col=cc(t.category);
    html+=`<div class="ti"><div class="tid" style="background:${col}22;color:${col}">${t.category.slice(0,2).toUpperCase()}</div><div class="tii"><div class="tic">${t.category}</div><div class="tin">${t.note||'—'}</div></div><div class="tia">−€${t.amount.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>`;
  });
  q('hl').innerHTML=html;
  q('lmb').style.display=((hp+1)*HPS)<txs.length?'block':'none';
}
function rReport(){
  if(rp==='annual'){q('rc').innerHTML=rAnnual();return}
  if(rp==='monthly'){q('rc').innerHTML=rMonthly();return}
  q('rc').innerHTML=rCats();
}
function bRow(lbl,v,mx,col,lw){const p=(v/mx)*100;return`<div class="ybi"><div class="ybl" style="width:${lw||38}px;color:${col||'var(--text3)'}">${lbl}</div><div class="ybt"><div class="ybf" style="width:${p}%;${col?`background:linear-gradient(90deg,${col},${col}88)`:''};"></div><span class="ybv">€${Math.round(v).toLocaleString('it-IT')}</span></div></div>`}
function rAnnual(){const by={};getTx().forEach(t=>{const y=new Date(t.date).getFullYear();by[y]=(by[y]||0)+t.amount});const ys=Object.keys(by).sort(),mx=Math.max(...Object.values(by));return'<div class="card"><div class="ct">Spese per anno</div>'+ys.map(y=>bRow(y,by[y],mx)).join('')+'<div style="font-size:10px;color:var(--text3);margin-top:8px">* 2021 e 2026 parziali</div></div>'}
function rMonthly(){const by={};getTx().forEach(t=>{const d=new Date(t.date),k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');by[k]=(by[k]||0)+t.amount});const ms=Object.keys(by).sort().slice(-24).reverse(),mx=Math.max(...ms.map(k=>by[k]));return'<div class="card"><div class="ct">Ultimi 24 mesi</div>'+ms.map(k=>{const[y,m]=k.split('-');return bRow(MI[parseInt(m)-1].slice(0,3)+' '+y,by[k],mx,'',54)}).join('')+'</div>'}
function rCats(){const by={};getTx().forEach(t=>{by[t.category]=(by[t.category]||0)+t.amount});const s=Object.entries(by).sort((a,b)=>b[1]-a[1]),mx=s[0]?.[1]||1;return'<div class="card"><div class="ct">Categorie — totale storico</div>'+s.map(([cat,v])=>bRow(cat.slice(0,9),v,mx,cc(cat),62)).join('')+'</div>'}
function rSettings(){
  q('thl').innerHTML=getCats().slice(0,20).map(cat=>`<div class="sr"><div><div class="sl" style="color:${cc(cat)}">${cat}</div><div class="ss">Alert se % vs mese prec.</div></div><input class="si" type="number" placeholder="%" value="${CFG.thresholds[cat]||''}" data-cat="${cat}" min="0" max="300"></div>`).join('');
  q('thl').querySelectorAll('.si').forEach(inp=>inp.addEventListener('change',function(){CFG.thresholds[this.dataset.cat]=this.value?parseInt(this.value):null;saveCFG()}));
  q('ccat').innerHTML=CFG.customCats.length?CFG.customCats.map((c,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:14px">${c}</span><button data-i="${i}" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px 8px">✕</button></div>`).join(''):'<div style="font-size:13px;color:var(--text3)">Nessuna categoria personalizzata</div>';
  q('ccat').querySelectorAll('button').forEach(btn=>btn.addEventListener('click',function(){CFG.customCats.splice(parseInt(this.dataset.i),1);saveCFG();rSettings()}));
  const all=getTx();q('sc').textContent=all.length;
  const dates=all.map(t=>t.date).sort();q('sf').textContent=dates[0]?new Date(dates[0]).toLocaleDateString('it-IT'):'—';
}
function addCat(){const v=q('nci').value.trim();if(!v)return;if(!CFG.customCats.includes(v)){CFG.customCats.push(v);saveCFG();toast('Categoria aggiunta');q('nci').value='';rSettings()}}
function exportCSV(){const rows=['Data,Categoria,Importo,Nota'];getTx().forEach(t=>rows.push(`${t.date},${t.category},${t.amount},"${(t.note||'').replace(/"/g,'""')}"`));const b=new Blob([rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='budget_'+new Date().toISOString().split('T')[0]+'.csv';a.click();toast('CSV esportato')}
window.addEventListener('load',function(){
  loadST();
  q('n0').addEventListener('click',()=>goPage('home'));
  q('n1').addEventListener('click',()=>goPage('add'));
  q('n2').addEventListener('click',()=>goPage('history'));
  q('n3').addEventListener('click',()=>goPage('report'));
  q('n4').addEventListener('click',()=>goPage('settings'));
  q('bpm').addEventListener('click',()=>{vm.setMonth(vm.getMonth()-1);rHome()});
  q('bnm').addEventListener('click',()=>{vm.setMonth(vm.getMonth()+1);rHome()});
  q('sbtn').addEventListener('click',submitE);
  q('lmb').addEventListener('click',()=>{hp++;let txs=getTx().filter(t=>hf==='Tutte'||t.category===hf);txs=txs.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));bldTx(txs)});
  q('ptm').addEventListener('click',function(){rp='monthly';document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));this.classList.add('active');rReport()});
  q('pta').addEventListener('click',function(){rp='annual';document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));this.classList.add('active');rReport()});
  q('ptc').addEventListener('click',function(){rp='cats';document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));this.classList.add('active');rReport()});
  q('bac').addEventListener('click',addCat);
  q('bex').addEventListener('click',()=>openModal('Esporta CSV','Scarica tutte le transazioni in formato CSV.',exportCSV));
  q('brs').addEventListener('click',()=>openModal('Reset dati nuovi','Elimina solo le transazioni inserite manualmente. Lo storico resta intatto.',()=>{ST.transactions=ST.transactions.filter(t=>t.imported);saveST();toast('Reset completato')}));
  q('mok').addEventListener('click',()=>{if(mcb)mcb();closeModal()});
  q('mno').addEventListener('click',closeModal);
  goPage('home');
});
</script>
</body>
</html>
